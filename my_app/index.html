<!DOCTYPE html>
<html>
<head>
  <title>Accessibility Assistant</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="w-full absolute top-0 left-0 px-8 py-4 flex justify-between items-center 
              border-b border-gray-200 bg-white/80 backdrop-blur-md">
    
    <!-- Left -->
    <div>
      <button class="text-gray-700 font-medium hover:text-purple-600 transition">
        Login
      </button>
    </div>

    <!-- Right -->
    <div class="space-x-6">
      <button class="text-gray-700 font-medium hover:text-purple-600 transition">About Us</button>
      <button class="text-gray-700 font-medium hover:text-purple-600 transition">Services</button>
      <button class="text-gray-700 font-medium hover:text-purple-600 transition">Contact</button>
    </div>

  </div>

  <!-- Main Content -->
  <div class="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 
              flex items-center justify-center pt-24 p-4">

    <div class="max-w-[900px] w-full text-center">

      <h1 class="mb-2 text-3xl bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
        Accessibility Assistant
      </h1>

      <p class="text-gray-500">Choose your interaction mode</p>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">

        <!-- Vision Card -->
        <div id="visionCard" onclick="toggleVision()" 
          class="rounded-3xl p-10 cursor-pointer transition-all duration-300 hover:scale-105 
                 shadow-lg bg-white border-2 border-blue-200 shadow-blue-100">

          <h2 class="text-3xl font-semibold">Vision Mode</h2>
          <p class="text-gray-500">Hands-free scrolling and zooming</p>

          <div id="visionBadge" 
            class="mt-5 px-8 py-3 rounded-full font-medium inline-block shadow-sm 
                   bg-blue-50 text-blue-700">
            Tap to Enable
          </div>
        </div>

        <!-- Voice Card -->
        <div id="voiceCard" onclick="toggleVoice()" 
          class="rounded-3xl p-10 cursor-pointer transition-all duration-300 hover:scale-105 
                 shadow-lg bg-white border-2 border-purple-200 shadow-purple-100">

          <h2 class="text-3xl font-semibold">Voice Control</h2>
          <p class="text-gray-500">Control your computer with voice</p>

          <div id="voiceBadge" 
            class="mt-5 px-8 py-3 rounded-full font-medium inline-block shadow-sm 
                   bg-purple-50 text-purple-700">
            Tap to Enable
          </div>
        </div>
      </div>

      <!-- Active Modes Box -->
      <div id="activeBox" class="mt-10 bg-white/80 backdrop-blur-sm p-6 rounded-3xl shadow-lg hidden">
        <h3 class="text-gray-700 mb-3">Active Mode:</h3>
        <div id="activeModes"></div>
      </div>

    </div>
  </div>

  <script>
    let visionMode = false;
    let voiceMode = false;

    function toggleVision() {
      visionMode = !visionMode;
      if (visionMode) voiceMode = false;
      updateUI();
    }

    function toggleVoice() {
      voiceMode = !voiceMode;
      if (voiceMode) visionMode = false;
      updateUI();
    }

    function updateUI() {
      const visionCard = document.getElementById("visionCard");
      const voiceCard = document.getElementById("voiceCard");
      const visionBadge = document.getElementById("visionBadge");
      const voiceBadge = document.getElementById("voiceBadge");
      const activeBox = document.getElementById("activeBox");
      const activeModes = document.getElementById("activeModes");

      // Reset cards
      visionCard.className = "rounded-3xl p-10 cursor-pointer transition-all duration-300 hover:scale-105 shadow-lg bg-white border-2 border-blue-200 shadow-blue-100";
      voiceCard.className = "rounded-3xl p-10 cursor-pointer transition-all duration-300 hover:scale-105 shadow-lg bg-white border-2 border-purple-200 shadow-purple-100";

      visionBadge.className = "mt-5 px-8 py-3 rounded-full font-medium inline-block shadow-sm bg-blue-50 text-blue-700";
      voiceBadge.className = "mt-5 px-8 py-3 rounded-full font-medium inline-block shadow-sm bg-purple-50 text-purple-700";

      visionBadge.textContent = "Tap to Enable";
      voiceBadge.textContent = "Tap to Enable";

      // Active states
      if (visionMode) {
        visionCard.className = "rounded-3xl p-10 cursor-pointer transition-all duration-300 hover:scale-105 shadow-lg bg-gradient-to-br from-blue-400 to-blue-600 text-white shadow-blue-300";
        visionBadge.className = "mt-5 px-6 py-3 rounded-full font-medium inline-block shadow-sm bg-white/30 text-white backdrop-blur-sm";
        visionBadge.textContent = "✓ Active";
      }

      if (voiceMode) {
        voiceCard.className = "rounded-3xl p-10 cursor-pointer transition-all duration-300 hover:scale-105 shadow-lg bg-gradient-to-br from-purple-400 to-pink-500 text-white shadow-purple-300";
        voiceBadge.className = "mt-5 px-6 py-3 rounded-full font-medium inline-block shadow-sm bg-white/30 text-white backdrop-blur-sm";
        voiceBadge.textContent = "✓ Listening";
      }

      // Active display
      activeModes.innerHTML = "";

      if (visionMode) {
        activeModes.innerHTML = '<span class="inline-block m-1.5 px-5 py-2.5 rounded-full font-medium bg-blue-50 text-blue-700 shadow-sm">Vision Mode</span>';
      }

      if (voiceMode) {
        activeModes.innerHTML = '<span class="inline-block m-1.5 px-5 py-2.5 rounded-full font-medium bg-purple-50 text-purple-700 shadow-sm">Voice Control</span>';
      }

      activeBox.classList.toggle("hidden", !(visionMode || voiceMode));
    }
  </script>

</body>
</html>
